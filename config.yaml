# 配置文件 for rvdata2json.rb

# 默认 RGSS 版本 (如果命令行未指定且无法从 Game.ini 检测)
# 可选值: "RGSS1", "RGSS2", "RGSS3"
rgss_version: "RGSS3"

# 输入文件夹路径 (相对于游戏目录)
input_dir_marshal: "Data_原始" # 存放原始 .rxdata/.rvdata/.rvdata2 文件的目录
input_dir_source: "Source" # 存放 .json 文件和 Scripts 目录的目录

# 输出文件夹路径 (相对于游戏目录)
output_dir_source: "Source" # 转换后 .json 文件和 Scripts 目录的存放目录
output_dir_marshal: "Data" # 转换后 .rxdata/.rvdata/.rvdata2 文件的存放目录

# 需要处理的文件基础名列表 (所有模式都将作为不区分大小写的 Ruby 正则表达式处理)
files:
  - Actors
  - Animations
  - Armors
  - Classes
  - CommonEvents
  - Enemies
  - Items
  - MapInfos
  - Scripts # <-- 这个模式会触发特殊处理
  - Skills
  - States
  - System
  - Tilesets
  - Troops
  - Weapons
  - Map\d{3} # 匹配 Map001, Map002, ...

# 需要排除的文件基础名列表 (所有模式都将作为不区分大小写的 Ruby 正则表达式处理)
exclude_files:
  - Areas # 仅 RGSS2, 通常不处理
  - Main # 如果 Main.rvdata2 等文件存在且应跳过

# --- 日志配置 ---
logging:
  # 要记录的最低严重级别。选项：DEBUG、INFO、WARN、ERROR、FATAL、UNKNOWN
  # 默认值：INFO (提供足够上下文，但不如 DEBUG 详细)
  log_level: "ERROR"

  # 是否将日志写入 log_directory 中的文件。
  # true: 写入文件; false: 仅输出到控制台 (STDERR)
  # 默认值：false
  log_to_file: false

  # 日志文件存储的目录（相对于游戏目录 --game-dir）。
  # 默认值："logs"
  log_directory: "logs"

  # 文件名格式。{timestamp} 将被替换为 YYYYMMDD_HHMMSS。
  # 默认值："rvdata2json_{timestamp}.log"
  log_filename_format: "rvdata2json_{timestamp}.log"

  # 启用控制台的彩色输出（如果控制台支持）。
  # 默认值：true
  enable_colors: true
# ---------------
