# 配置文件 for RM-Toolkit.rb

# 默认 RGSS 版本 (如果命令行未指定且无法自动检测)
# 可选值: "RGSS1", "RGSS2", "RGSS3", "MV", "MZ"
rgss_version: "MZ"

# --- 项目结构定义 ---
project_structure:
  game_data_dir: "Data"
  source_data_dir: "Source"
  mv_mz_asset_dirs:
    - audio
    - css
    - data
    - effects
    - fonts
    - icon
    - img
    - js
    - movies

# --- 存档文件处理设置 ---
archive_processing:
  enabled: true
  archive_filenames:
    RGSS1: "Game.rgssad"
    RGSS2: "Game.rgss2a"
    RGSS3: "Game.rgss3a"
  delete_archive_after_extraction: false

# --- 快照选项 ---
snapshot_options:
  directory: ".snapshots"
  format: "{dirname}_snapshot_{name}_{timestamp}"

  # --- 自动快照配置 ---
  # 在 RGSS 解包 (--unpack) 成功后自动创建初始快照
  auto_snapshot_after_rgss_unpack: true

# 要处理的文件基础名列表
files:
  - Actors
  - Animations
  - Armors
  - Classes
  - CommonEvents
  - Enemies
  - Items
  - MapInfos
  - Scripts
  - Skills
  - States
  - System
  - Tilesets
  - Troops
  - Weapons
  - Map\d{3}

# 需要排除的文件基础名列表
exclude_files:
  - Areas

# --- 日志配置 ---
logging:
  log_level: "WARN"
  log_to_file: true
  log_directory: "logs"
  log_filename_format: "RM-Toolkit_{timestamp}.log"
  enable_colors: true