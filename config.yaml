# 配置文件 for rvdata2json.rb

# 默认 RGSS 版本 (如果命令行未指定且无法从 Game.ini 检测)
# 可选值: "RGSS1", "RGSS2", "RGSS3"
rgss_version: "RGSS3"

# 输入文件夹路径 (相对于游戏目录)
# 处理 RVData/RXData -> Source(JSON/Scripts) 时使用
input_dir_marshal: "Data_原始" # 存放原始 .rxdata/.rvdata/.rvdata2 文件的目录
# 处理 Source(JSON/Scripts) -> RVData/RXData 时使用
input_dir_source: "Source" # <--- 重命名并更新默认值: 存放 .json 文件和 Scripts 目录的目录

# 输出文件夹路径 (相对于游戏目录)
# 处理 RVData/RXData -> Source(JSON/Scripts) 时的输出目录
output_dir_source: "Source" # <--- 重命名并更新默认值: 转换后 .json 文件和 Scripts 目录的存放目录
# 处理 Source(JSON/Scripts) -> RVData/RXData 时的输出目录
output_dir_marshal: "Data" # 转换后 .rxdata/.rvdata/.rvdata2 文件的存放目录

# 需要处理的文件基础名列表 (所有模式都将作为不区分大小写的 Ruby 正则表达式处理)
# 程序会根据转换方向和 RGSS 版本自动添加正确的扩展名 (.rxdata/.rvdata/.rvdata2 或 .json/.rb)
# 注意: "Scripts" 模式会触发特殊的脚本解包/封包逻辑
files:
  - Actors
  - Animations
  - Armors
  - Classes
  - CommonEvents
  - Enemies
  - Items
  - MapInfos
  - Scripts # <-- 这个模式会触发特殊处理
  - Skills
  - States
  - System
  - Tilesets # 仅 RGSS3，但包含无害；如果文件 (.rvdata2) 未找到则跳过
  - Troops
  - Weapons
  - Map\d{3} # 匹配 Map001, Map002, ...

# 需要排除的文件基础名列表 (所有模式都将作为不区分大小写的 Ruby 正则表达式处理)
# 这些文件即使匹配上面的 'files' 列表，也不会被处理
exclude_files:
  - Areas # 仅 RGSS2, 通常不处理
  - Main # 如果 Main.rvdata2 等文件存在且应跳过
  # - Scripts    # <-- 注意: 如果你想完全跳过脚本处理，可以在这里排除，但通常应该在 files 中包含它来启用功能
